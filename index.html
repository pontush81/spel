<!doctype html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Spelhörnan</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%B5%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    color-scheme: light dark;
    --bg: #faf6ec; --bg-2: #f1e9d6; --card: #fffdf7; --ink: #22303a;
    --ink-soft: #5f6f79; --line: #e4d9bf; --accent: #c98a1e; --accent-strong: #a9711a;
    --accent-ink: #1a1206; --good: #2f8f5b; --bad: #c0492f;
    --shadow: 0 18px 40px -18px rgba(40,30,10,.35);
    --face-shadow: 0 10px 26px -10px rgba(40,30,10,.4);
  }
  :root[data-mode="song"] {
    --bg: #f6f1e7; --bg-2: #ece2d0; --card: #fffcf5; --ink: #2a211c;
    --ink-soft: #6e6156; --line: #ddcfb8; --accent: #9c3b2e; --accent-strong: #7f2f24;
    --accent-ink: #fff; --good: #4a7c4e; --bad: #b0472f;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1e28; --bg-2: #13252f; --card: #172b36; --ink: #f2ede1;
      --ink-soft: #9fb0ba; --line: #26404d; --accent: #e8b04b; --accent-strong: #f2c163;
      --accent-ink: #1a1206; --good: #4bbd7e; --bad: #ef7a5f;
      --shadow: 0 20px 44px -20px rgba(0,0,0,.6);
      --face-shadow: 0 14px 30px -10px rgba(0,0,0,.55);
    }
    :root[data-mode="song"] {
      --bg: #1a1512; --bg-2: #221a16; --card: #26201b; --ink: #f3ebdd;
      --ink-soft: #b3a493; --line: #3a2f27; --accent: #d76a53; --accent-strong: #e58269;
      --accent-ink: #fff; --good: #6fbf74; --bad: #e8836b;
    }
  }
  :root[data-theme="light"] { color-scheme: light; }
  :root[data-theme="dark"] { color-scheme: dark; }
  :root[data-theme="light"]:not([data-mode="song"]) {
    --bg: #faf6ec; --bg-2: #f1e9d6; --card: #fffdf7; --ink: #22303a;
    --ink-soft: #5f6f79; --line: #e4d9bf; --accent: #c98a1e; --accent-strong: #a9711a;
    --accent-ink: #1a1206; --good: #2f8f5b; --bad: #c0492f;
    --shadow: 0 18px 40px -18px rgba(40,30,10,.35);
    --face-shadow: 0 10px 26px -10px rgba(40,30,10,.4);
  }
  :root[data-theme="light"][data-mode="song"] {
    --bg: #f6f1e7; --bg-2: #ece2d0; --card: #fffcf5; --ink: #2a211c;
    --ink-soft: #6e6156; --line: #ddcfb8; --accent: #9c3b2e; --accent-strong: #7f2f24;
    --accent-ink: #fff; --good: #4a7c4e; --bad: #b0472f;
  }
  :root[data-theme="dark"]:not([data-mode="song"]) {
    --bg: #0f1e28; --bg-2: #13252f; --card: #172b36; --ink: #f2ede1;
    --ink-soft: #9fb0ba; --line: #26404d; --accent: #e8b04b; --accent-strong: #f2c163;
    --accent-ink: #1a1206; --good: #4bbd7e; --bad: #ef7a5f;
    --shadow: 0 20px 44px -20px rgba(0,0,0,.6);
    --face-shadow: 0 14px 30px -10px rgba(0,0,0,.55);
  }
  :root[data-theme="dark"][data-mode="song"] {
    --bg: #1a1512; --bg-2: #221a16; --card: #26201b; --ink: #f3ebdd;
    --ink-soft: #b3a493; --line: #3a2f27; --accent: #d76a53; --accent-strong: #e58269;
    --accent-ink: #fff; --good: #6fbf74; --bad: #e8836b;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Avenir Next", "Avenir", system-ui, -apple-system, sans-serif;
    background: radial-gradient(120% 80% at 50% -20%, var(--bg-2), var(--bg)) fixed;
    color: var(--ink); -webkit-font-smoothing: antialiased;
    min-height: 100vh; display: flex; justify-content: center;
    transition: background .4s ease;
  }
  .app {
    width: 100%; max-width: 480px;
    padding: 28px 20px calc(40px + env(safe-area-inset-bottom));
    padding-top: calc(24px + env(safe-area-inset-top));
    display: flex; flex-direction: column;
  }
  .hidden { display: none !important; }

  header { text-align: center; margin-bottom: 20px; }
  .eyebrow {
    font-size: .72rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--accent-strong); font-weight: 600; margin-bottom: 6px;
  }
  h1 {
    font-family: "Charter", "Georgia", serif; font-weight: 700; font-size: 2rem;
    margin: 0; letter-spacing: -.01em; text-wrap: balance;
  }

  /* ---- Meny ---- */
  .menu { display: flex; flex-direction: column; gap: 14px; margin-top: 8px; }
  .menu-card {
    display: flex; align-items: center; gap: 16px; text-align: left;
    background: var(--card); border: 1px solid var(--line); border-radius: 20px;
    padding: 20px; cursor: pointer; box-shadow: var(--shadow);
    transition: transform .12s ease; font: inherit; color: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .menu-card:active { transform: scale(.98); }
  .menu-card .icon { font-size: 2.6rem; line-height: 1; }
  .menu-card .mc-title {
    font-family: "Charter", "Georgia", serif; font-size: 1.35rem; font-weight: 700;
  }
  .menu-card .mc-sub { color: var(--ink-soft); font-size: .9rem; margin-top: 2px; }
  .menu-hint { text-align: center; color: var(--ink-soft); font-size: .8rem; margin-top: 18px; }

  /* ---- Spel ---- */
  .topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .back {
    background: transparent; border: 1px solid var(--line); color: var(--ink-soft);
    border-radius: 10px; padding: 8px 12px; font: inherit; font-weight: 600;
    font-size: .82rem; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .game-title { font-family: "Charter", "Georgia", serif; font-weight: 700; font-size: 1.2rem; }

  .regions {
    display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
    padding: 4px 2px 6px; margin: 8px -2px 0; -webkit-overflow-scrolling: touch;
  }
  .regions::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto; border: 1px solid var(--line); background: transparent;
    color: var(--ink-soft); font: inherit; font-size: .84rem; font-weight: 600;
    padding: 8px 15px; border-radius: 999px; cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .chip.active { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }

  /* Album-väljare (flerval, mobilvänlig) */
  .album-picker { margin: 10px 0 4px; }
  .album-toggle {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 12px 16px; min-height: 48px;
    border: 1px solid var(--line); border-radius: 14px; background: var(--card);
    color: var(--ink); font: inherit; font-weight: 600; font-size: .9rem;
    cursor: pointer; -webkit-tap-highlight-color: transparent; box-shadow: var(--shadow);
  }
  .album-toggle .chev { color: var(--accent-strong); font-size: .8rem; }
  .album-picker .album-tools { margin-top: 10px; }
  .album-tools {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-bottom: 9px;
  }
  .album-tools .selall {
    background: transparent; border: 1px solid var(--accent); color: var(--accent-strong);
    font: inherit; font-weight: 700; font-size: .82rem; padding: 8px 15px;
    border-radius: 999px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .album-tools .count { font-size: .8rem; color: var(--ink-soft); white-space: nowrap; }
  .album-grid {
    display: flex; flex-direction: column;
    border: 1px solid var(--line); border-radius: 14px;
    background: var(--card); overflow: hidden; box-shadow: var(--shadow);
  }
  .acheck {
    display: flex; align-items: center; gap: 12px;
    min-height: 46px; padding: 11px 15px; cursor: pointer;
    font-size: .92rem; font-weight: 500; color: var(--ink);
    border-bottom: 1px solid var(--line);
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .acheck:last-child { border-bottom: none; }
  .acheck input {
    width: 20px; height: 20px; margin: 0; flex: 0 0 auto;
    accent-color: var(--accent); cursor: pointer;
  }
  .acheck .yr { color: var(--ink-soft); font-weight: 400; }

  /* Lägen & svårighet (segmenterade knappar) */
  .song-controls { display: flex; gap: 14px; flex-wrap: wrap; margin: 14px 0 2px; }
  .ctl { display: flex; flex-direction: column; gap: 5px; }
  .ctl > span {
    font-size: .66rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--ink-soft); font-weight: 600; padding-left: 2px;
  }
  .seg {
    display: flex; border: 1px solid var(--line); border-radius: 999px;
    overflow: hidden; background: var(--card);
  }
  .seg button {
    border: none; background: transparent; color: var(--ink-soft);
    font: inherit; font-weight: 600; font-size: .84rem; padding: 9px 16px;
    cursor: pointer; -webkit-tap-highlight-color: transparent; min-height: 42px;
    transition: background .15s, color .15s;
  }
  .seg button.on { background: var(--accent); color: var(--accent-ink); }

  /* Streak-rad */
  .streakbar {
    display: flex; justify-content: center; gap: 14px; margin: 12px 2px 2px;
    font-size: .82rem; color: var(--ink-soft); font-weight: 600;
  }
  .streakbar b { color: var(--accent-strong); font-variant-numeric: tabular-nums; }

  /* Flerval-knappar */
  .choices { display: grid; grid-template-columns: 1fr; gap: 9px; margin-top: 18px; }
  .choice {
    text-align: left; font: inherit; font-weight: 600; font-size: 1rem;
    padding: 14px 16px; border: 1px solid var(--line); border-radius: 14px;
    background: var(--card); color: var(--ink); cursor: pointer; min-height: 54px;
    -webkit-tap-highlight-color: transparent; transition: border-color .15s, background .15s, opacity .15s;
  }
  .choice:active { transform: scale(.99); }
  .choice.correct { background: var(--good); color: #06210f; border-color: var(--good); }
  .choice.wrong { background: var(--bad); color: #fff; border-color: var(--bad); }
  .choices.answered .choice:not(.correct):not(.wrong) { opacity: .5; }

  /* Dela-knapp */
  .share-btn {
    margin-top: 16px; width: 100%; font: inherit; font-weight: 700; font-size: .95rem;
    padding: 13px 16px; border-radius: 14px; border: 1px solid var(--accent);
    background: transparent; color: var(--accent-strong); cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .scoreboard {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 14px 0 12px;
  }
  .stat {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 10px 8px; text-align: center; box-shadow: var(--shadow);
  }
  .stat b {
    display: block; font-family: "Charter", "Georgia", serif; font-size: 1.5rem;
    line-height: 1; font-variant-numeric: tabular-nums;
  }
  .stat.right b { color: var(--good); }
  .stat.wrong b { color: var(--bad); }
  .stat span {
    display: block; margin-top: 4px; font-size: .68rem; letter-spacing: .12em;
    text-transform: uppercase; color: var(--ink-soft);
  }
  .progress {
    height: 6px; background: var(--line); border-radius: 999px;
    overflow: hidden; margin: 0 2px 18px;
  }
  .progress-fill {
    height: 100%; width: 0; background: var(--accent);
    border-radius: 999px; transition: width .35s ease;
  }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 24px;
    box-shadow: var(--shadow); padding: 28px 22px 24px; text-align: center;
  }
  .face-btn {
    display: block; width: 100%; border: none; background: none;
    cursor: pointer; padding: 0; -webkit-tap-highlight-color: transparent;
  }
  .face-flag {
    font-size: clamp(6rem, 34vw, 9rem); line-height: 1.1;
    filter: drop-shadow(var(--face-shadow));
    transition: transform .35s cubic-bezier(.2,.8,.2,1); user-select: none;
  }
  .face-quote {
    position: relative; font-family: "Charter", "Georgia", serif; font-style: italic;
    font-size: clamp(1.3rem, 5.4vw, 1.65rem); line-height: 1.4; color: var(--ink);
    padding: 8px 4px 4px; text-wrap: balance; min-height: 3em;
    display: flex; align-items: center; justify-content: center;
    transition: transform .3s cubic-bezier(.2,.8,.2,1);
  }
  .face-quote::before {
    content: "\201D"; position: absolute; top: -.35em; left: -.05em;
    font-size: 3.2em; line-height: 1; color: var(--accent); opacity: .2;
    font-family: "Georgia", serif;
  }
  .face-btn:active .face-flag, .face-btn:active .face-quote { transform: scale(.96); }

  .hint {
    margin-top: 12px; font-size: .85rem; color: var(--ink-soft);
    letter-spacing: .02em; transition: opacity .2s;
  }
  .revealed .hint, .done .hint { opacity: 0; height: 0; margin-top: 0; overflow: hidden; }

  .answer {
    max-height: 0; opacity: 0; overflow: hidden;
    transition: max-height .4s ease, opacity .35s ease, margin .3s ease;
  }
  .answer.show { max-height: 220px; opacity: 1; margin-top: 8px; }
  .ans-title {
    font-family: "Charter", "Georgia", serif; font-size: 1.65rem; font-weight: 700;
    margin: 0; text-wrap: balance; line-height: 1.15;
  }
  .ans-sub { margin: 6px 0 0; font-size: .95rem; color: var(--ink-soft); }
  .ans-sub b { color: var(--ink); font-weight: 600; }

  .verdict {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 18px;
    max-height: 0; opacity: 0; overflow: hidden;
    transition: max-height .35s ease, opacity .3s ease, margin .3s ease;
  }
  .verdict.show { max-height: 80px; opacity: 1; }

  button.action {
    font: inherit; font-weight: 700; border: 1px solid transparent; border-radius: 14px;
    padding: 14px 16px; cursor: pointer; transition: transform .08s, filter .15s;
    -webkit-tap-highlight-color: transparent;
  }
  button.action:active { transform: scale(.97); }
  .btn-good { background: var(--good); color: #06210f; }
  .btn-bad  { background: var(--bad); color: #fff; }

  .footer-controls {
    display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 16px;
  }
  .btn-next { background: var(--accent); color: var(--accent-ink); font-size: 1.02rem; }
  .btn-ghost { background: transparent; border-color: var(--line); color: var(--ink-soft); }

  footer {
    text-align: center; margin-top: 22px; font-size: .74rem;
    color: var(--ink-soft); line-height: 1.6;
  }
  code {
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: .72rem;
    background: var(--card); padding: 1px 5px; border-radius: 5px; border: 1px solid var(--line);
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

  /* ===== Multiplayer ===== */
  .mp-wrap { display: flex; flex-direction: column; gap: 14px; }
  .mp-choice { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 6px; }
  .mp-bigbtn {
    display: flex; flex-direction: column; gap: 4px; align-items: center; justify-content: center;
    padding: 22px 12px; border-radius: 16px; border: 1px solid var(--line);
    background: var(--card); color: var(--ink); cursor: pointer; font: inherit; text-align: center;
  }
  .mp-bigbtn .icon { font-size: 2rem; }
  .mp-bigbtn .t { font-weight: 700; }
  .mp-bigbtn .s { font-size: .8rem; color: var(--ink-soft); }
  .mp-field { display: flex; flex-direction: column; gap: 6px; }
  .mp-field label { font-size: .8rem; color: var(--ink-soft); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
  .mp-input {
    width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--line);
    background: var(--card); color: var(--ink); font: inherit; box-sizing: border-box;
  }
  .mp-input.pin { text-align: center; font-size: 1.6rem; letter-spacing: .3em; font-weight: 700; }
  .mp-pin-display {
    text-align: center; font-size: 2.8rem; font-weight: 800; letter-spacing: .25em;
    color: var(--accent-strong); background: var(--card); border: 1px solid var(--line);
    border-radius: 16px; padding: 14px; margin: 4px 0;
  }
  .mp-pin-display small { display: block; font-size: .8rem; letter-spacing: .06em; color: var(--ink-soft); font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
  .mp-players { display: flex; flex-direction: column; gap: 8px; }
  .mp-player {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px;
    background: var(--card); border: 1px solid var(--line);
  }
  .mp-player .av { width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; background: var(--bg-2); font-size: 1rem; }
  .mp-player .nm { font-weight: 600; flex: 1; }
  .mp-player .badge { font-size: .7rem; color: var(--accent-ink); background: var(--accent); padding: 2px 8px; border-radius: 999px; font-weight: 700; }
  .mp-player .pts { font-weight: 800; color: var(--accent-strong); }
  .mp-seg { display: flex; gap: 8px; }
  .mp-seg button {
    flex: 1; padding: 10px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--card); color: var(--ink); font: inherit; font-weight: 700; cursor: pointer;
  }
  .mp-seg button.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .mp-albums { max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; border: 1px solid var(--line); border-radius: 12px; padding: 8px; }
  .mp-albums label { display: flex; align-items: center; gap: 8px; font-size: .9rem; padding: 4px; }
  .mp-adv { border: 1px solid var(--line); border-radius: 12px; background: var(--card); }
  .mp-adv > summary { cursor: pointer; padding: 13px 16px; font-weight: 700; list-style: none; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .mp-adv > summary::-webkit-details-marker { display: none; }
  .mp-adv > summary::after { content: "▸"; margin-left: auto; color: var(--ink-soft); transition: transform .15s; }
  .mp-adv[open] > summary::after { transform: rotate(90deg); }
  .mp-adv .mp-advhint { color: var(--ink-soft); font-weight: 400; font-size: .8rem; }
  .mp-adv .mp-seg { margin: 0 14px 8px; }
  .mp-adv .mp-albums { margin: 0 14px 14px; }
  .mp-timer {
    height: 10px; border-radius: 999px; background: var(--bg-2); overflow: hidden; margin: 4px 0 2px;
  }
  .mp-timer > div { height: 100%; background: var(--accent); width: 100%; transition: width 1s linear; }
  .mp-q { font-family: Georgia, "Times New Roman", serif; font-style: italic; font-size: 1.5rem; line-height: 1.4; text-align: center; margin: 10px 0 6px; }
  .mp-status { text-align: center; color: var(--ink-soft); font-size: .9rem; }
  .mp-gain { font-weight: 800; color: var(--ink-soft); }
  .mp-gain.pos { color: var(--good); }
  .mp-podium { display: flex; flex-direction: column; gap: 10px; align-items: center; margin: 8px 0; }
  .mp-podium .row { display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px 16px; border-radius: 14px; background: var(--card); border: 1px solid var(--line); }
  .mp-podium .row.p1 { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .mp-podium .row .rk { font-size: 1.3rem; width: 34px; text-align: center; }
  .mp-podium .row .nm { flex: 1; font-weight: 700; }
  .choice.chosen { outline: 3px solid var(--accent); outline-offset: -3px; }
  .mp-count { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 40px 0; }
  .mp-count-num {
    font-size: 6rem; font-weight: 800; line-height: 1; color: var(--accent-strong);
    width: 8rem; text-align: center;
  }
  .mp-count-label { font-size: 1.1rem; color: var(--ink-soft); font-weight: 600; }
  @keyframes mpPop { 0% { transform: scale(.4); opacity: 0; } 60% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); } }
</style>
</head>
<body>
<div class="app">

  <!-- ===== MENY ===== -->
  <section id="menu">
    <header>
      <div class="eyebrow">Spelhörnan</div>
      <h1>Välj ett spel</h1>
    </header>
    <div class="menu">
      <button class="menu-card" data-game="flag">
        <span class="icon">🌍</span>
        <span>
          <span class="mc-title">Flaggspel</span>
          <span class="mc-sub" id="flagCount"></span>
        </span>
      </button>
      <button class="menu-card" data-game="song">
        <span class="icon">🎵</span>
        <span>
          <span class="mc-title">Gissa Winnerbäck-låten</span>
          <span class="mc-sub" id="songCount"></span>
        </span>
      </button>
    </div>
    <p class="menu-hint">Tryck på en flagga/citat för att se svaret. Varje omgång visar allt en gång.</p>
  </section>

  <!-- ===== WINNERBÄCK: VÄLJ LÄGE ===== -->
  <section id="songHub" class="hidden">
    <div class="topbar">
      <button class="back" id="hubBack">← Meny</button>
      <span class="game-title">Gissa Winnerbäck-låten</span>
    </div>
    <div class="mp-wrap">

  const LS = {
    get(k, d) { try { const v = localStorage.getItem(k); return v === null ? d : v; } catch (e) { return d; } },
    set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} },
    num(k) { const n = parseInt(this.get(k, "0"), 10); return isNaN(n) ? 0 : n; },
  };

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];

    return a;
  }

    $("statRight").textContent = stats.right;

  }

  function startRound() {
    const pool = M.multiSelect
      ? M.base.filter((q) => selectedAlbums.has(q[2]))
      : M.filter(activeRegion);
    if (M.multiSelect && pool.length === 0) {
      roundOver = true; current = null; deck = []; roundSize = 0;
      stats = { right: 0, wrong: 0 }; streak = 0; roundBestStreak = 0;
      $("choices").classList.add("hidden");
      $("btnShare").classList.add("hidden");
      $("faceBtn").style.pointerEvents = "";

      $("answer").classList.add("show"); $("verdict").classList.remove("show");
      updateStreakBar();
      render();
      return;
    }
    deck = shuffle(pool);
    roundSize = deck.length;
    stats = { right: 0, wrong: 0 };
    streak = 0; roundBestStreak = 0;
    poolTitles = M.mode === "song" ? [...new Set(pool.map((q) => q[1]))] : [];

  }

  function nextCard() {
    advancing = false;

  }

  // Renderar aktuellt kort (current) i nuvarande läge/svårighet – utan att dra nytt citat
  function showCurrentCard() {
    if (!current) return;
    revealed = false; answered = false; roundOver = false;
    $("face").innerHTML = M.faceHTML(current);
    $("btnNext").textContent = M.nextLabel;
    $("card").classList.remove("revealed", "done");
    $("answer").classList.remove("show");
    $("verdict").classList.remove("show");
    $("btnShare").classList.add("hidden");
    if (isChoice()) {
      $("faceBtn").style.pointerEvents = "none";
      renderChoices();

      $("faceBtn").style.pointerEvents = "";
      $("choices").classList.add("hidden");
    }
    $("hint").textContent = currentHintText();
    render();
  }

  function albumHint(it) {
    return it[2] ? `Ledtråd: albumet ${it[2]}` : "Ledtråd saknas";
  }

  // Vilken text ledtrådsraden ska visa för aktuellt kort
  function currentHintText() {
    if (!current) return "";
    if (isChoice()) return difficulty === "latt" ? albumHint(current) : "";
    return (M.mode === "song" && difficulty === "latt") ? albumHint(current) : M.hint;
  }

  function renderChoices() {
    const box = $("choices");
    box.className = "choices";           // synlig, ej answered
    box.innerHTML = "";
    const correct = current[1];
    let others = shuffle(poolTitles.filter((t) => t !== correct)).slice(0, 3);
    if (others.length < 3) {                       // fyll på från alla låtar om poolen är liten
      const extra = shuffle(ALL_TITLES.filter((t) => t !== correct && !others.includes(t)));
      others = others.concat(extra.slice(0, 3 - others.length));
    }
    const opts = shuffle([correct, ...others]);
    opts.forEach((t) => {
      const b = document.createElement("button");
      b.className = "choice";
      b.textContent = t;
      b.onclick = () => answerChoice(t, b);
      box.appendChild(b);
    });
  }

  function answerChoice(title, btn) {
    if (answered || roundOver) return;
    answered = true;
    const correct = title === current[1];
    const box = $("choices");
    box.classList.add("answered");
    [...box.children].forEach((b) => {
      b.disabled = true;
      if (b.textContent === current[1]) b.classList.add("correct");
      else if (b === btn) b.classList.add("wrong");

    $("ansTitle").textContent = current[1];

    $("hint").textContent = correct ? "Rätt! Tryck för nästa citat" : "Fel – tryck för nästa citat";

  function registerResult(correct) {
    if (counted) return;   // samma citat redan räknat (t.ex. svarat, sen togglat läge)

    if (correct) {

      stats.wrong++; streak = 0;

    bar.innerHTML = `🔥 Svit <b>${streak}</b> · Rekord <b>${Math.max(best, roundBestStreak)}</b>`;

  /* ---- Host-auktoritet ---- */
  function hostBuildQuestions() {
    const { albums, num } = MP.settings;
    const pool = [];
    QUOTES.forEach((q, i) => { if (albums.has(q[2])) pool.push(i); });
    const poolTitles = [...new Set(pool.map((i) => QUOTES[i][1]))];
    const pick = shuffle(pool).slice(0, Math.min(num, pool.length));
    return pick.map((qIdx) => {
      const correct = QUOTES[qIdx][1];
      let others = shuffle(poolTitles.filter((t) => t !== correct)).slice(0, 3);
      if (others.length < 3) {
        const extra = shuffle(ALL_TITLES.filter((t) => t !== correct && !others.includes(t)));
        others = others.concat(extra.slice(0, 3 - others.length));
      }
      return { qIdx, options: shuffle([correct, ...others]) };
    });
  }
  function hostStartGame() {
    MP.questions = hostBuildQuestions();
    MP.scores = new Map();
    MP.curIdx = -1;
    hostNextQuestion();

  function hostNextQuestion() {
    MP.curIdx++;
    if (MP.curIdx >= MP.questions.length) { hostFinish(); return; }
    // delad 3-2-1-nedräkning, sen skickas frågan så alla skärmar flippar samtidigt
    MP.ch.send({ type: "broadcast", event: "countdown", payload: { index: MP.curIdx, total: MP.questions.length } });
    if (MP.timer) clearTimeout(MP.timer);
    MP.timer = setTimeout(() => hostSendQuestion(MP.curIdx), 3000);
  }
  function hostSendQuestion(idx) {
    MP.answersQ = new Map();
    const q = MP.questions[idx];
    MP.ch.send({ type: "broadcast", event: "question", payload: {
      index: idx, total: MP.questions.length, timerSec: MP.TIMER, qIdx: q.qIdx, options: q.options
    } });
    if (MP.timer) clearTimeout(MP.timer);
    MP.timer = setTimeout(hostEndQuestion, MP.TIMER * 1000 + 700);
  }
  function hostOnAnswer(p) {
    if (!MP.answersQ || p.index !== MP.curIdx || MP.answersQ.has(p.id)) return;
    MP.answersQ.set(p.id, { ci: p.choiceIndex, ms: typeof p.ms === "number" ? p.ms : MP.TIMER * 1000 });
    const present = mpRoster().map((x) => x.id);
    if (present.length && present.every((id) => MP.answersQ.has(id))) {
      if (MP.timer) clearTimeout(MP.timer);
      MP.timer = setTimeout(hostEndQuestion, 300);
    }
  }
  function hostEndQuestion() {
    const q = MP.questions[MP.curIdx];
    const correct = QUOTES[q.qIdx][1];
    const limit = MP.TIMER * 1000;
    const gains = {};
    for (const [id, a] of MP.answersQ) {
      let pts = 0;
      if (q.options[a.ci] === correct) {
        pts = Math.round(1000 * (1 - Math.min(a.ms, limit) / limit)); // snabbhetspoäng 0–1000
      }
      gains[id] = pts;
      if (pts) MP.scores.set(id, (MP.scores.get(id) || 0) + pts);
    }
    MP.ch.send({ type: "broadcast", event: "reveal", payload: { index: MP.curIdx, board: hostBoard(), gains } });
    MP.timer = setTimeout(hostNextQuestion, MP.REVEAL_MS);
  }
  function hostFinish() {
    MP.ch.send({ type: "broadcast", event: "finished", payload: { board: hostBoard() } });
  }
  function hostBoard() {
    const names = {};
    mpRoster().forEach((p) => names[p.id] = p.name);
    const ids = new Set([...Object.keys(names), ...MP.scores.keys()]);
    const arr = [...ids].map((id) => ({ id, name: names[id] || "—", score: MP.scores.get(id) || 0 }));
    arr.sort((a, b) => b.score - a.score || String(a.name).localeCompare(b.name));
    return arr;
  }

  /* ---- Klient-rendering ---- */
  function mpClearCount() { if (MP.countTimer) { clearInterval(MP.countTimer); MP.countTimer = null; } }
  function mpOnCountdown(p) {
    MP.phase = "countdown"; MP.answered = false; MP.qNow = null;
    mpClearCount();
    mpBody().innerHTML =
      '<p class="mp-status">Fråga ' + (p.index + 1) + ' av ' + p.total + '</p>' +
      '<div class="mp-count"><div class="mp-count-num" id="mpCountNum"></div><div class="mp-count-label">Gör dig redo…</div></div>';
    let n = 3;
    const el = $("mpCountNum");
    const paint = () => {
      el.textContent = n;
      el.style.animation = "none";
      requestAnimationFrame(() => { el.style.animation = "mpPop .5s ease-out"; });
    };
    paint();
    MP.countTimer = setInterval(() => {
      n--;
      if (n <= 0) { mpClearCount(); return; }
      paint();
    }, 1000);
  }
  function mpOnQuestion(p) {
    mpClearCount();
    MP.phase = "question"; MP.qNow = p; MP.answered = false;
    const quote = QUOTES[p.qIdx] ? QUOTES[p.qIdx][0] : "";
    mpBody().innerHTML =
      '<p class="mp-status">Fråga ' + (p.index + 1) + ' av ' + p.total + '</p>' +
      '<div class="mp-timer"><div id="mpTimerBar"></div></div>' +
      '<div class="card"><div class="mp-q">' + mpEsc(quote) + '</div>' +
      '<div class="choices" id="mpChoices"></div><p class="mp-status" id="mpQStatus">Välj rätt låt!</p></div>' +
      '<div id="mpBoard"></div>';
    const box = $("mpChoices");
    p.options.forEach((t, i) => {
      const b = document.createElement("button");
      b.className = "choice"; b.textContent = t;
      b.onclick = () => mpAnswer(i, b);
      box.appendChild(b);
    });
    const bar = $("mpTimerBar");
    bar.style.transition = "none"; bar.style.width = "100%";
    requestAnimationFrame(() => { bar.style.transition = "width " + p.timerSec + "s linear"; bar.style.width = "0%"; });
    MP.qStart = performance.now();
  }
  function mpAnswer(i, btn) {
    if (MP.answered) return;
    MP.answered = true;
    const ms = Math.max(0, Math.round(performance.now() - (MP.qStart || performance.now())));
    $("mpChoices").querySelectorAll(".choice").forEach((b) => b.disabled = true);
    btn.classList.add("chosen");
    const st = $("mpQStatus"); if (st) st.textContent = "Du svarade – väntar på facit…";
    MP.ch.send({ type: "broadcast", event: "answer", payload: { id: MP.me, index: MP.qNow.index, choiceIndex: i, ms } });
  }
  function mpOnReveal(p) {
    mpClearCount();
    MP.phase = "reveal";
    const box = $("mpChoices");
    if (box && MP.qNow) {
      const correct = QUOTES[MP.qNow.qIdx] ? QUOTES[MP.qNow.qIdx][1] : null;
      box.classList.add("answered");
      box.querySelectorAll(".choice").forEach((b) => {
        b.disabled = true;
        if (b.textContent === correct) b.classList.add("correct");
        else if (b.classList.contains("chosen")) b.classList.add("wrong");
      });
      const gain = p.gains ? (p.gains[MP.me] || 0) : null;
      const gainTxt = (MP.answered && gain !== null) ? ' <span class="mp-gain' + (gain > 0 ? " pos" : "") + '">+' + gain + ' p</span>' : "";
      const st = $("mpQStatus"); if (st) st.innerHTML = "Rätt svar: <b>" + mpEsc(correct) + "</b>" + gainTxt;
    }
    mpShowBoard(p.board);
  }
  function mpShowBoard(board) {
    let el = $("mpBoard");
    if (!el) { el = document.createElement("div"); el.id = "mpBoard"; mpBody().appendChild(el); }
    el.innerHTML = '<div class="mp-field"><label>Ställning</label><div class="mp-players">' +
      board.slice(0, 8).map((p, i) => '<div class="mp-player"><span class="av">' + (i + 1) + '</span><span class="nm">' + mpEsc(p.name) + '</span><span class="pts">' + p.score + '</span></div>').join("") +
      '</div></div>';
  }
  function mpOnFinished(p) {
    mpClearCount();
    MP.phase = "final";
    const medal = ["🥇", "🥈", "🥉"];
    mpBody().innerHTML =
      '<p class="mp-status">Slutresultat</p><div class="mp-podium">' +
      p.board.map((x, i) => '<div class="row ' + (i === 0 ? "p1" : "") + '"><span class="rk">' + (medal[i] || (i + 1)) + '</span><span class="nm">' + mpEsc(x.name) + '</span><span class="pts">' + x.score + '</span></div>').join("") +
      '</div>' +
      (MP.role === "host" ? '<button class="action btn-next" id="mpAgain">Spela igen →</button>' : '<p class="mp-status">Värden kan starta en ny match.</p>') +
      '<button class="action btn-ghost" id="mpToMenu">Till menyn</button>';
    if (MP.role === "host") $("mpAgain").onclick = () => mpRenderLobby();
    $("mpToMenu").onclick = mpBackToMenu;
  }

  /* ---- Direktlänk: …/#join=1234 öppnar Gå med med koden ifylld ---- */
  function mpCheckDeepLink() {
    const m = /join=(\d{4})/.exec(location.hash);
    if (m && !MP.ch) { openMultiplayer(); mpRenderJoin(m[1]); }
  }
  window.addEventListener("hashchange", mpCheckDeepLink);
  mpCheckDeepLink();
</script>
