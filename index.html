<!doctype html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Spelhörnan</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%B5%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    color-scheme: light dark;
    --bg: #faf6ec; --bg-2: #f1e9d6; --card: #fffdf7; --ink: #22303a;
    --ink-soft: #5f6f79; --line: #e4d9bf; --accent: #c98a1e; --accent-strong: #a9711a;
    --accent-ink: #1a1206; --good: #2f8f5b; --bad: #c0492f;
    --shadow: 0 18px 40px -18px rgba(40,30,10,.35);
    --face-shadow: 0 10px 26px -10px rgba(40,30,10,.4);
  }
  :root[data-mode="song"] {
    --bg: #f6f1e7; --bg-2: #ece2d0; --card: #fffcf5; --ink: #2a211c;
    --ink-soft: #6e6156; --line: #ddcfb8; --accent: #9c3b2e; --accent-strong: #7f2f24;
    --accent-ink: #fff; --good: #4a7c4e; --bad: #b0472f;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1e28; --bg-2: #13252f; --card: #172b36; --ink: #f2ede1;
      --ink-soft: #9fb0ba; --line: #26404d; --accent: #e8b04b; --accent-strong: #f2c163;
      --accent-ink: #1a1206; --good: #4bbd7e; --bad: #ef7a5f;
      --shadow: 0 20px 44px -20px rgba(0,0,0,.6);
      --face-shadow: 0 14px 30px -10px rgba(0,0,0,.55);
    }
    :root[data-mode="song"] {
      --bg: #1a1512; --bg-2: #221a16; --card: #26201b; --ink: #f3ebdd;
      --ink-soft: #b3a493; --line: #3a2f27; --accent: #d76a53; --accent-strong: #e58269;
      --accent-ink: #fff; --good: #6fbf74; --bad: #e8836b;
    }
  }
  :root[data-theme="light"] { color-scheme: light; }
  :root[data-theme="dark"] { color-scheme: dark; }
  :root[data-theme="light"]:not([data-mode="song"]) {
    --bg: #faf6ec; --bg-2: #f1e9d6; --card: #fffdf7; --ink: #22303a;
    --ink-soft: #5f6f79; --line: #e4d9bf; --accent: #c98a1e; --accent-strong: #a9711a;
    --accent-ink: #1a1206; --good: #2f8f5b; --bad: #c0492f;
    --shadow: 0 18px 40px -18px rgba(40,30,10,.35);
    --face-shadow: 0 10px 26px -10px rgba(40,30,10,.4);
  }
  :root[data-theme="light"][data-mode="song"] {
    --bg: #f6f1e7; --bg-2: #ece2d0; --card: #fffcf5; --ink: #2a211c;
    --ink-soft: #6e6156; --line: #ddcfb8; --accent: #9c3b2e; --accent-strong: #7f2f24;
    --accent-ink: #fff; --good: #4a7c4e; --bad: #b0472f;
  }
  :root[data-theme="dark"]:not([data-mode="song"]) {
    --bg: #0f1e28; --bg-2: #13252f; --card: #172b36; --ink: #f2ede1;
    --ink-soft: #9fb0ba; --line: #26404d; --accent: #e8b04b; --accent-strong: #f2c163;
    --accent-ink: #1a1206; --good: #4bbd7e; --bad: #ef7a5f;
    --shadow: 0 20px 44px -20px rgba(0,0,0,.6);
    --face-shadow: 0 14px 30px -10px rgba(0,0,0,.55);
  }
  :root[data-theme="dark"][data-mode="song"] {
    --bg: #1a1512; --bg-2: #221a16; --card: #26201b; --ink: #f3ebdd;
    --ink-soft: #b3a493; --line: #3a2f27; --accent: #d76a53; --accent-strong: #e58269;
    --accent-ink: #fff; --good: #6fbf74; --bad: #e8836b;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Avenir Next", "Avenir", system-ui, -apple-system, sans-serif;
    background: radial-gradient(120% 80% at 50% -20%, var(--bg-2), var(--bg)) fixed;
    color: var(--ink); -webkit-font-smoothing: antialiased;
    min-height: 100vh; display: flex; justify-content: center;
    transition: background .4s ease;
  }
  .app {
    width: 100%; max-width: 480px;
    padding: 28px 20px calc(40px + env(safe-area-inset-bottom));
    padding-top: calc(24px + env(safe-area-inset-top));
    display: flex; flex-direction: column;
  }
  .hidden { display: none !important; }

  header { text-align: center; margin-bottom: 20px; }
  .eyebrow {
    font-size: .72rem; letter-spacing: .22em; text-transform: uppercase;
    color: var(--accent-strong); font-weight: 600; margin-bottom: 6px;
  }
  h1 {
    font-family: "Charter", "Georgia", serif; font-weight: 700; font-size: 2rem;
    margin: 0; letter-spacing: -.01em; text-wrap: balance;
  }

  /* ---- Meny ---- */
  .menu { display: flex; flex-direction: column; gap: 14px; margin-top: 8px; }
  .menu-card {
    display: flex; align-items: center; gap: 16px; text-align: left;
    background: var(--card); border: 1px solid var(--line); border-radius: 20px;
    padding: 20px; cursor: pointer; box-shadow: var(--shadow);
    transition: transform .12s ease; font: inherit; color: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .menu-card:active { transform: scale(.98); }
  .menu-card .icon { font-size: 2.6rem; line-height: 1; }
  .menu-card .mc-title {
    font-family: "Charter", "Georgia", serif; font-size: 1.35rem; font-weight: 700;
  }
  .menu-card .mc-sub { color: var(--ink-soft); font-size: .9rem; margin-top: 2px; }
  .menu-hint { text-align: center; color: var(--ink-soft); font-size: .8rem; margin-top: 18px; }

  /* ---- Spel ---- */
  .topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .back {
    background: transparent; border: 1px solid var(--line); color: var(--ink-soft);
    border-radius: 10px; padding: 8px 12px; font: inherit; font-weight: 600;
    font-size: .82rem; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .game-title { font-family: "Charter", "Georgia", serif; font-weight: 700; font-size: 1.2rem; }

  .regions {
    display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
    padding: 4px 2px 6px; margin: 8px -2px 0; -webkit-overflow-scrolling: touch;
  }
  .regions::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto; border: 1px solid var(--line); background: transparent;
    color: var(--ink-soft); font: inherit; font-size: .84rem; font-weight: 600;
    padding: 8px 15px; border-radius: 999px; cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .chip.active { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }

  /* Album-väljare (flerval, mobilvänlig) */
  .album-picker { margin: 10px 0 4px; }
  .album-toggle {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 12px 16px; min-height: 48px;
    border: 1px solid var(--line); border-radius: 14px; background: var(--card);
    color: var(--ink); font: inherit; font-weight: 600; font-size: .9rem;
    cursor: pointer; -webkit-tap-highlight-color: transparent; box-shadow: var(--shadow);
  }
  .album-toggle .chev { color: var(--accent-strong); font-size: .8rem; }
  .album-picker .album-tools { margin-top: 10px; }
  .album-tools {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-bottom: 9px;
  }
  .album-tools .selall {
    background: transparent; border: 1px solid var(--accent); color: var(--accent-strong);
    font: inherit; font-weight: 700; font-size: .82rem; padding: 8px 15px;
    border-radius: 999px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .album-tools .count { font-size: .8rem; color: var(--ink-soft); white-space: nowrap; }
  .album-grid {
    display: flex; flex-direction: column;
    border: 1px solid var(--line); border-radius: 14px;
    background: var(--card); overflow: hidden; box-shadow: var(--shadow);
  }
  .acheck {
    display: flex; align-items: center; gap: 12px;
    min-height: 46px; padding: 11px 15px; cursor: pointer;
    font-size: .92rem; font-weight: 500; color: var(--ink);
    border-bottom: 1px solid var(--line);
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .acheck:last-child { border-bottom: none; }
  .acheck input {
    width: 20px; height: 20px; margin: 0; flex: 0 0 auto;
    accent-color: var(--accent); cursor: pointer;
  }
  .acheck .yr { color: var(--ink-soft); font-weight: 400; }

  /* Lägen & svårighet (segmenterade knappar) */
  .song-controls { display: flex; gap: 14px; flex-wrap: wrap; margin: 14px 0 2px; }
  .ctl { display: flex; flex-direction: column; gap: 5px; }
  .ctl > span {
    font-size: .66rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--ink-soft); font-weight: 600; padding-left: 2px;
  }
  .seg {
    display: flex; border: 1px solid var(--line); border-radius: 999px;
    overflow: hidden; background: var(--card);
  }
  .seg button {
    border: none; background: transparent; color: var(--ink-soft);
    font: inherit; font-weight: 600; font-size: .84rem; padding: 9px 16px;
    cursor: pointer; -webkit-tap-highlight-color: transparent; min-height: 42px;
    transition: background .15s, color .15s;
  }
  .seg button.on { background: var(--accent); color: var(--accent-ink); }

  /* Streak-rad */
  .streakbar {
    display: flex; justify-content: center; gap: 14px; margin: 12px 2px 2px;
    font-size: .82rem; color: var(--ink-soft); font-weight: 600;
  }
  .streakbar b { color: var(--accent-strong); font-variant-numeric: tabular-nums; }

  /* Flerval-knappar */
  .choices { display: grid; grid-template-columns: 1fr; gap: 9px; margin-top: 18px; }
  .choice {
    text-align: left; font: inherit; font-weight: 600; font-size: 1rem;
    padding: 14px 16px; border: 1px solid var(--line); border-radius: 14px;
    background: var(--card); color: var(--ink); cursor: pointer; min-height: 54px;
    -webkit-tap-highlight-color: transparent; transition: border-color .15s, background .15s, opacity .15s;
  }
  .choice:active { transform: scale(.99); }
  .choice.correct { background: var(--good); color: #06210f; border-color: var(--good); }
  .choice.wrong { background: var(--bad); color: #fff; border-color: var(--bad); }
  .choices.answered .choice:not(.correct):not(.wrong) { opacity: .5; }

  /* Dela-knapp */
  .share-btn {
    margin-top: 16px; width: 100%; font: inherit; font-weight: 700; font-size: .95rem;
    padding: 13px 16px; border-radius: 14px; border: 1px solid var(--accent);
    background: transparent; color: var(--accent-strong); cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .scoreboard {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 14px 0 12px;
  }
  .stat {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 10px 8px; text-align: center; box-shadow: var(--shadow);
  }
  .stat b {
    display: block; font-family: "Charter", "Georgia", serif; font-size: 1.5rem;
    line-height: 1; font-variant-numeric: tabular-nums;
  }
  .stat.right b { color: var(--good); }
  .stat.wrong b { color: var(--bad); }
  .stat span {
    display: block; margin-top: 4px; font-size: .68rem; letter-spacing: .12em;
    text-transform: uppercase; color: var(--ink-soft);
  }
  .progress {
    height: 6px; background: var(--line); border-radius: 999px;
    overflow: hidden; margin: 0 2px 18px;
  }
  .progress-fill {
    height: 100%; width: 0; background: var(--accent);
    border-radius: 999px; transition: width .35s ease;
  }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 24px;
    box-shadow: var(--shadow); padding: 28px 22px 24px; text-align: center;
  }
  .face-btn {
    display: block; width: 100%; border: none; background: none;
    cursor: pointer; padding: 0; -webkit-tap-highlight-color: transparent;
  }
  .face-flag {
    font-size: clamp(6rem, 34vw, 9rem); line-height: 1.1;
    filter: drop-shadow(var(--face-shadow));
    transition: transform .35s cubic-bezier(.2,.8,.2,1); user-select: none;
  }
  .face-quote {
    position: relative; font-family: "Charter", "Georgia", serif; font-style: italic;
    font-size: clamp(1.3rem, 5.4vw, 1.65rem); line-height: 1.4; color: var(--ink);
    padding: 8px 4px 4px; text-wrap: balance; min-height: 3em;
    display: flex; align-items: center; justify-content: center;
    transition: transform .3s cubic-bezier(.2,.8,.2,1);
  }
  .face-quote::before {
    content: "\201D"; position: absolute; top: -.35em; left: -.05em;
    font-size: 3.2em; line-height: 1; color: var(--accent); opacity: .2;
    font-family: "Georgia", serif;
  }
  .face-btn:active .face-flag, .face-btn:active .face-quote { transform: scale(.96); }

  .hint {
    margin-top: 12px; font-size: .85rem; color: var(--ink-soft);
    letter-spacing: .02em; transition: opacity .2s;
  }
  .revealed .hint, .done .hint { opacity: 0; height: 0; margin-top: 0; overflow: hidden; }

  .answer {
    max-height: 0; opacity: 0; overflow: hidden;
    transition: max-height .4s ease, opacity .35s ease, margin .3s ease;
  }
  .answer.show { max-height: 220px; opacity: 1; margin-top: 8px; }
  .ans-title {
    font-family: "Charter", "Georgia", serif; font-size: 1.65rem; font-weight: 700;
    margin: 0; text-wrap: balance; line-height: 1.15;
  }
  .ans-sub { margin: 6px 0 0; font-size: .95rem; color: var(--ink-soft); }
  .ans-sub b { color: var(--ink); font-weight: 600; }

  .verdict {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 18px;
    max-height: 0; opacity: 0; overflow: hidden;
    transition: max-height .35s ease, opacity .3s ease, margin .3s ease;
  }
  .verdict.show { max-height: 80px; opacity: 1; }

  button.action {
    font: inherit; font-weight: 700; border: 1px solid transparent; border-radius: 14px;
    padding: 14px 16px; cursor: pointer; transition: transform .08s, filter .15s;
    -webkit-tap-highlight-color: transparent;
  }
  button.action:active { transform: scale(.97); }
  .btn-good { background: var(--good); color: #06210f; }
  .btn-bad  { background: var(--bad); color: #fff; }

  .footer-controls {
    display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 16px;
  }
  .btn-next { background: var(--accent); color: var(--accent-ink); font-size: 1.02rem; }
  .btn-ghost { background: transparent; border-color: var(--line); color: var(--ink-soft); }

  footer {
    text-align: center; margin-top: 22px; font-size: .74rem;
    color: var(--ink-soft); line-height: 1.6;
  }
  code {
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: .72rem;
    background: var(--card); padding: 1px 5px; border-radius: 5px; border: 1px solid var(--line);
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div class="app">

  <!-- ===== MENY ===== -->
  <section id="menu">
    <header>
      <div class="eyebrow">Spelhörnan</div>
      <h1>Välj ett spel</h1>
    </header>
    <div class="menu">
      <button class="menu-card" data-game="flag">
        <span class="icon">🌍</span>
        <span>
          <span class="mc-title">Flaggspel</span>
          <span class="mc-sub" id="flagCount"></span>
        </span>
      </button>
      <button class="menu-card" data-game="song">
        <span class="icon">🎵</span>
        <span>
          <span class="mc-title">Gissa Winnerbäck-låten</span>
          <span class="mc-sub" id="songCount"></span>
        </span>
      </button>
    </div>
    <p class="menu-hint">Tryck på en flagga/citat för att se svaret. Varje omgång visar allt en gång.</p>
  </section>

  <!-- ===== SPEL ===== -->
  <section id="game" class="hidden">
    <div class="topbar">
      <button class="back" id="btnBack">← Meny</button>
      <span class="game-title" id="gameTitle"></span>
    </div>

    <nav class="regions hidden" id="regions" aria-label="Välj region"></nav>
    <div class="song-controls hidden" id="songControls"></div>
    <div class="streakbar hidden" id="streakBar"></div>

    <div class="scoreboard">
      <div class="stat right"><b id="statRight">0</b><span>Rätt</span></div>
      <div class="stat wrong"><b id="statWrong">0</b><span>Fel</span></div>
      <div class="stat"><b id="statRemain">0</b><span>Kvar</span></div>
    </div>
    <div class="progress"><div class="progress-fill" id="progFill"></div></div>

    <div class="card" id="card">
      <button class="face-btn" id="faceBtn" aria-label="Visa svaret">
        <div id="face"></div>
      </button>
      <div class="choices hidden" id="choices"></div>
      <p class="hint" id="hint"></p>
      <div class="answer" id="answer">
        <p class="ans-title" id="ansTitle"></p>
        <p class="ans-sub" id="ansSub"></p>
      </div>
      <div class="verdict" id="verdict">
        <button class="action btn-good" id="btnRight">✓ Jag kunde</button>
        <button class="action btn-bad" id="btnWrong">✗ Missade</button>
      </div>
      <button class="share-btn hidden" id="btnShare">📋 Dela resultat</button>
    </div>

    <div class="footer-controls">
      <button class="action btn-next" id="btnNext">Nästa →</button>
      <button class="action btn-ghost" id="btnReset">Börja om</button>
    </div>

    <footer id="gameFooter"></footer>
  </section>
</div>

    });
    // visa album under och låt spelaren gå vidare själv
    $("ansTitle").textContent = current[1];
    $("ansSub").innerHTML = current[2] ? `Album: <b>${current[2]}</b>` : "";
    $("answer").classList.add("show");
    $("hint").textContent = correct ? "Rätt! Tryck för nästa citat" : "Fel – tryck för nästa citat";
    $("faceBtn").style.pointerEvents = "";   // kortet blir klickbart för att gå vidare
    registerResult(correct);
  }

  function reveal() {
    if (revealed || roundOver) return;
    revealed = true;
    $("card").classList.add("revealed");
    $("ansTitle").textContent = M.ansTitle(current);
    $("ansSub").innerHTML = M.ansSub(current);
    $("answer").classList.add("show");
    $("verdict").classList.add("show");
  }

  function registerResult(correct) {
    if (counted) return;   // samma citat redan räknat (t.ex. svarat, sen togglat läge)
    counted = true;
    if (correct) {
      stats.right++; streak++;
      if (streak > roundBestStreak) roundBestStreak = streak;
      // spara rekordet löpande (annars når man aldrig slutet på 370 kort)
      if (roundBestStreak > LS.num("wq_beststreak")) LS.set("wq_beststreak", roundBestStreak);
    } else {
      stats.wrong++; streak = 0;
    }
    updateStreakBar();
    render();
  }

  function updateStreakBar() {
    const bar = $("streakBar");
    if (!M || M.mode !== "song") { bar.classList.add("hidden"); return; }
    bar.classList.remove("hidden");
    const best = LS.num("wq_beststreak");
    bar.innerHTML = `🔥 Svit <b>${streak}</b> · Rekord <b>${Math.max(best, roundBestStreak)}</b>`;
  }

  function score(correct) {
    if (!revealed || answered || roundOver) return;
    answered = true;
    registerResult(correct);
    advancing = true;
    setTimeout(nextCard, 260);
  }

  function showRoundOver() {
    roundOver = true; current = null;
    const answeredCount = stats.right + stats.wrong;
    $("choices").classList.add("hidden");
    $("faceBtn").style.pointerEvents = "";
    $("face").innerHTML = `<div class="face-flag">${M.mode === "flag" ? "🎉" : "🎵"}</div>`;
    $("card").classList.add("done");
    $("card").classList.remove("revealed");
    $("ansTitle").textContent = "Omgången klar!";
    let sub = `Du fick <b>${stats.right}</b> rätt av <b>${answeredCount}</b>`;

    if (M.mode === "song" && answeredCount > 0) {
      const prevBest = LS.num("wq_best"), prevStreak = LS.num("wq_beststreak");
      const isRecord = stats.right > prevBest;
      if (stats.right > prevBest) LS.set("wq_best", stats.right);
      if (roundBestStreak > prevStreak) LS.set("wq_beststreak", roundBestStreak);
      sub += `<br>Längsta svit: <b>${roundBestStreak}</b>`;
      sub += isRecord ? `<br>🏆 Nytt rekord!` : `<br>Rekord: <b>${Math.max(prevBest, stats.right)}</b> rätt`;
      $("btnShare").classList.remove("hidden");
    } else {
      $("btnShare").classList.add("hidden");
    }
    $("ansSub").innerHTML = sub;
    $("answer").classList.add("show");
    $("verdict").classList.remove("show");
    $("btnNext").textContent = "Spela igen →";
    updateStreakBar();
    render();
  }

  function shareResult() {
    const answered = stats.right + stats.wrong;
    const lag = songMode === "choice" ? "Flerval" : "Gissa själv";
    const svar = difficulty === "latt" ? "Lätt" : "Svår";
    const albums = M.albums.filter((a) => selectedAlbums.has(a));
    const albumRad = albums.length === M.albums.length
      ? "Alla album" : `${albums.length} album`;
    const text =
      `🎵 Gissa Winnerbäck-låten\n` +
      `${stats.right}/${answered} rätt · längsta svit ${roundBestStreak}\n` +
      `${lag}, ${svar} · ${albumRad}\n` +
      `pontush81.github.io/spel`;
    const done = () => { $("btnShare").textContent = "✓ Kopierat!"; setTimeout(() => { $("btnShare").textContent = "📋 Dela resultat"; }, 1800); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(done);
    } else { done(); }
  }

  function renderRegions() {
    const nav = $("regions");
    if (M.multiSelect) { renderAlbumPicker(nav); return; }
    if (!M.hasRegions) { nav.classList.add("hidden"); return; }
    nav.className = "regions";
    nav.classList.remove("hidden");
    nav.innerHTML = "";
    (M.regions || REGIONS).forEach((r) => {
      const b = document.createElement("button");
      b.className = "chip" + (r === activeRegion ? " active" : "");
      b.textContent = r;
      b.onclick = () => { activeRegion = r; renderRegions(); startRound(); };
      nav.appendChild(b);
    });
  }

  function renderAlbumPicker(nav) {
    nav.className = "album-picker";
    nav.classList.remove("hidden");
    nav.innerHTML = "";
    const albums = M.albums;
    const allOn = albums.every((a) => selectedAlbums.has(a));
    const nSel = albums.filter((a) => selectedAlbums.has(a)).length;
    const nSongs = new Set(
      M.base.filter((q) => selectedAlbums.has(q[2])).map((q) => q[1])
    ).size;

    // Hopfällbar rad — visar sammanfattning, öppnar panelen vid tryck
    const head = document.createElement("button");
    head.className = "album-toggle";
    const label = allOn ? "Alla album" : `${nSel} av ${albums.length} album`;
    head.innerHTML = `<span>🎚️ ${label} · ${nSongs} låtar</span>`
      + `<span class="chev">${albumsOpen ? "▲" : "▼"}</span>`;
    head.onclick = () => { albumsOpen = !albumsOpen; renderRegions(); };
    nav.appendChild(head);

    if (!albumsOpen) return;   // hopfälld: visa bara raden

    const tools = document.createElement("div");
    tools.className = "album-tools";
    const btn = document.createElement("button");
    btn.className = "selall";
    btn.textContent = allOn ? "Avmarkera alla" : "Välj alla";
    btn.onclick = () => {
      if (albums.every((a) => selectedAlbums.has(a))) selectedAlbums.clear();
      else albums.forEach((a) => selectedAlbums.add(a));
      renderRegions(); startRound();
    };
    const count = document.createElement("span");
    count.className = "count";
    count.textContent = `${nSongs} låtar valda`;
    tools.appendChild(btn); tools.appendChild(count);
    nav.appendChild(tools);

    const grid = document.createElement("div");
    grid.className = "album-grid";
    albums.forEach((a) => {
      const on = selectedAlbums.has(a);
      const lab = document.createElement("label");
      lab.className = "acheck" + (on ? " on" : "");
      const cb = document.createElement("input");
      cb.type = "checkbox"; cb.checked = on;
      cb.onchange = () => {
        cb.checked ? selectedAlbums.add(a) : selectedAlbums.delete(a);
        renderRegions(); startRound();
      };
      const span = document.createElement("span");
      span.textContent = a;
      const year = SONG_ALBUM_YEAR[a];
      if (year) {
        const yr = document.createElement("span");
        yr.className = "yr";
        yr.textContent = ` (${year})`;
        span.appendChild(yr);
      }
      lab.appendChild(cb); lab.appendChild(span);
      grid.appendChild(lab);
    });
    nav.appendChild(grid);
  }

  function renderSongControls() {
    const box = $("songControls");
    if (!M || M.mode !== "song") { box.classList.add("hidden"); return; }
    box.classList.remove("hidden");
    box.innerHTML = "";
    const seg = (label, options, value, onPick) => {
      const ctl = document.createElement("div"); ctl.className = "ctl";
      const lab = document.createElement("span"); lab.textContent = label; ctl.appendChild(lab);
      const s = document.createElement("div"); s.className = "seg";
      options.forEach(([val, txt]) => {
        const b = document.createElement("button");
        b.className = val === value ? "on" : "";
        b.textContent = txt;
        b.onclick = () => onPick(val);
        s.appendChild(b);
      });
      ctl.appendChild(s); return ctl;
    };
    box.appendChild(seg("Läge", [["choice", "Flerval"], ["self", "Gissa själv"]], songMode, (v) => {
      if (v === songMode) return;
      songMode = v; LS.set("wq_mode", v); renderSongControls();
      // Byt läge på samma citat i stället för att dra ett nytt
      if (current && !roundOver) showCurrentCard(); else startRound();
    }));
    box.appendChild(seg("Svårighet", [["latt", "Lätt"], ["svar", "Svår"]], difficulty, (v) => {
      if (v === difficulty) return;
      difficulty = v; LS.set("wq_diff", v); renderSongControls();
      // uppdatera ledtråden direkt på aktuellt kort (om inte besvarat/slut)
      if (!roundOver && !answered) $("hint").textContent = currentHintText();
    }));
  }

  function openGame(key) {
    M = MODES[key];
    activeRegion = "Alla";
    albumsOpen = false;
    if (M.multiSelect) selectedAlbums = new Set(M.albums);
    root.setAttribute("data-mode", key === "song" ? "song" : "flag");
    $("gameTitle").textContent = M.title;
    $("gameFooter").innerHTML = M.footer();
    renderRegions();
    renderSongControls();
    $("menu").classList.add("hidden");
    $("game").classList.remove("hidden");
    startRound();
  }

  function backToMenu() {
    root.removeAttribute("data-mode");
    $("game").classList.add("hidden");
    $("menu").classList.remove("hidden");
    updateMenuCounts();
  }

  /* ---- Kopplingar ---- */
  document.querySelectorAll(".menu-card").forEach((btn) =>
    btn.addEventListener("click", () => openGame(btn.dataset.game)));
  $("btnBack").addEventListener("click", backToMenu);
  $("faceBtn").addEventListener("click", () => {
    if (roundOver) { startRound(); return; }
    if (advancing) return;
    if (isChoice()) { if (answered) nextCard(); return; }  // flerval: svara via knappar, gå vidare via kort
    if (revealed) nextCard(); else reveal();
  });
  $("btnNext").addEventListener("click", () => {
    if (roundOver) { startRound(); return; }
    if (advancing) return;
    nextCard();
  });
  $("btnRight").addEventListener("click", () => score(true));
  $("btnWrong").addEventListener("click", () => score(false));
  $("btnReset").addEventListener("click", startRound);
  $("btnShare").addEventListener("click", shareResult);
  document.addEventListener("keydown", (e) => {
    if ($("game").classList.contains("hidden")) return;
    if (roundOver) { if (e.key === " ") { e.preventDefault(); startRound(); } return; }
    if (isChoice()) {
      if (answered) {
        if (e.key === " " || e.key === "Enter") { e.preventDefault(); nextCard(); }
        return;
      }
      const n = parseInt(e.key, 10);
      if (n >= 1 && n <= 4) {
        const btns = $("choices").querySelectorAll(".choice");
        if (btns[n - 1]) btns[n - 1].click();
      }
      return;
    }
    if (advancing) return;
    if (e.key === " ") { e.preventDefault(); revealed ? nextCard() : reveal(); }
    else if (e.key.toLowerCase() === "r") score(true);
    else if (e.key.toLowerCase() === "f") score(false);
  });

  function updateMenuCounts() {
    const songs = new Set(QUOTES.map((q) => q[1])).size;
    const rek = LS.num("wq_beststreak");
    $("flagCount").textContent = `${COUNTRIES.length} länder · välj världsdel`;
    $("songCount").textContent = `${songs} låtar · ${SONG_ALBUMS.length} album` + (rek > 0 ? ` · längsta svit ${rek}` : "");
  }
  updateMenuCounts();
</script>
</body>
</html>
